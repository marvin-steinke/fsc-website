name: Build and Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'
    - cron: '0 0 * * 0'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Website to FTP Server
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scrape articles
        run: npm run scrape

      - name: Build site
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PW }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: /public_html/
